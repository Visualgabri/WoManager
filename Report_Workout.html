      function renderCards() {
        const container = document.getElementById("content");
        if (!container) return;
        container.innerHTML = "";
        
        const filtroSettimana = parseInt(document.getElementById("settimanaFiltro").value || 0);
        const filtroObsoleti = document.getElementById("clientiObsoletiFiltro").value;
        
        let filtrati = tuttiIDati;
        
        
        if (filtroSettimana > 0) {
          filtrati = filtrati.filter(item => item.settimanaRaggiunta === filtroSettimana);
        }
        
        if (filtroObsoleti === "no") {
          filtrati = filtrati.filter(item => !item.obsoleto);
        } else if (filtroObsoleti === "solo") {
          filtrati = filtrati.filter(item => item.obsoleto);
        }

        
        if (filtrati.length === 0) {
          container.innerHTML = `
            <div class='col-span-full bg-slate-100/50 border border-slate-200 p-8 rounded-2xl flex flex-col items-center justify-center'>
              <svg class="w-12 h-12 text-slate-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              <p class='text-slate-600 text-lg font-medium'>Nessun atleta trovato con i filtri attuali.</p>
            </div>`;
          return;
        }

        filtrati.forEach(item => {

          let barColor = "bg-rose-500";
          let textColor = "text-rose-600";
          let badgeBg = "bg-rose-50";
          
          if (item.perc >= 75) {
            barColor = "bg-emerald-500";
            textColor = "text-emerald-600";
            badgeBg = "bg-emerald-50";
          } else if (item.perc >= 35) {
            barColor = "bg-amber-400";
            textColor = "text-amber-600";
            badgeBg = "bg-amber-50";
          }
          
          
          const settimaneMancanti = Math.max(0, 6 - item.settimanaRaggiunta);

          const dataFineStr = dataFine.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' });

            <div class="flex flex-wrap gap-2 mb-4">
              <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-semibold ${badgeBg} ${textColor} border border-current/10">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                Settimana ${item.settimanaRaggiunta}/6
              </span>
              <span class="inline-flex items-center px-2 py-1 rounded-md text-[11px] font-medium ${settimaneMancanti === 0 ? 'bg-indigo-50 text-indigo-600 border border-indigo-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}">
                <svg class="w-3 h-3 mr-1 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                ${testoScadenza}
              </span>
              <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-slate-50 text-slate-600 border border-slate-200">
                <svg class="w-3.5 h-3.5 mr-1 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                ${item.timeElapsed}
              </span>
            </div>
            
            <div class="mt-auto pt-3 border-t border-slate-100 space-y-2">
              ${item.mancanti && item.mancanti !== '-' ? `
                <div class="flex items-start bg-rose-50/50 p-2 rounded-lg border border-rose-100">
                  ${alertIcon}
                  <div class="ml-1.5">
                    <p class="text-[11px] font-bold text-rose-800 uppercase tracking-wider mb-0.5">Workout Mancanti</p>
                    <p class="text-rose-600 text-xs font-medium leading-relaxed">${item.mancanti}</p>
                  </div>
                </div>
              ` : `
                <div class="flex items-center bg-emerald-50 p-2 rounded-lg border border-emerald-100">
                  ${checkIcon}
                  <p class="text-emerald-700 text-xs font-bold ml-1.5 uppercase tracking-wide">Percorso Netto</p>
                </div>
              `}
              
              ${item.note && item.note !== '✔ Tutto completato' ? `
                <div class="flex items-start px-1 mt-2">
                  <svg class="w-4 h-4 text-amber-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2h-1v-3a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                  <p class="text-amber-700 text-xs font-medium ml-1.5">${item.note}</p>
                </div>
              ` : ''}
            </div>
          `;
          
          container.appendChild(card);
        });
      }
    </script>
  </body>
</html>
